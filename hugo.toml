baseURL = "https://aisecatlas.github.io/"
languageCode = "ko-KR"
defaultContentLanguage = "ko"
title = "AISec Atlas"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[pagination]
  pagerSize = 10

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "AISec Atlas"
  description = "한국어로 보는 보안 솔루션 표준 정합성 가이드"
  keywords = ["Zero Trust", "ZTA", "AI Security", "보안 아키텍처", "CISA", "NIST"]
  author = "AISec Atlas"
  defaultTheme = "light"
  disableThemeToggle = true
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = false
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = false
  ShowToc = true
  TocOpen = false
  comments = false
  hideSummary = false

  [params.homeInfoParams]
    Title = "보안 솔루션, 표준 기준으로 다시 본다"
    Content = """
글로벌 보안 솔루션을 한국어로 정리하고, CISA와 NIST의 Zero Trust 표준에 비춰 점수를 매깁니다. 도입을 고민 중인 실무자가 바로 쓸 수 있도록 공개 자료만 사용합니다.

[솔루션 가이드 →](/pillars/) &nbsp;&nbsp; [표준과 규제 →](/framework/) &nbsp;&nbsp; [검색 →](/search/)
"""

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[[menu.main]]
  identifier = "guide"
  name = "솔루션 가이드"
  url = "/pillars/"
  weight = 10

[[menu.main]]
  identifier = "standards"
  name = "표준과 규제"
  url = "/framework/"
  weight = 20

[[menu.main]]
  identifier = "weekly"
  name = "월간 동향"
  url = "/weekly/"
  weight = 30

# 월간 동향 하위 목차 (최신 호 + 전체 보기)
[[menu.main]]
  identifier = "weekly-2026-05"
  name = "2026년 5월호"
  url = "/weekly/2026-05/"
  parent = "weekly"
  weight = 1

[[menu.main]]
  identifier = "search"
  name = "검색"
  url = "/search/"
  weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokai"
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

[taxonomies]
  category = "categories"
  tag = "tags"
  pillar = "pillars"
  series = "series"
