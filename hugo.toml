baseURL = "https://aisecatlas.github.io/"
languageCode = "ko-KR"
defaultContentLanguage = "ko"
title = "AISec Atlas"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[pagination]
  pagerSize = 10

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "AISec Atlas"
  description = "한국어로 보는 보안 솔루션 표준 정합성 가이드"
  keywords = ["Zero Trust", "ZTA", "AI Security", "보안 아키텍처", "CISA", "NIST"]
  author = "AISec Atlas"
  defaultTheme = "light"
  disableThemeToggle = true
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = false
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = false
  ShowToc = true
  TocOpen = false
  comments = false
  hideSummary = false

  [params.homeInfoParams]
    Title = "보안 솔루션, 표준 기준으로 다시 본다"
    Content = """
글로벌 보안 솔루션을 한국어로 정리하고, 미국 CISA와 NIST의 Zero Trust 표준에 비춰 점수를 매깁니다.

도입을 고민 중인 실무자가 의사결정에 바로 쓸 수 있도록, 공개 자료만으로 평가합니다.
"""

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

# 1. 둘러보기 (Overview)
[[menu.main]]
  identifier = "matrix"
  name = "매트릭스"
  url = "/matrix/"
  weight = 10

# 2. 레퍼런스 (Reference) — 핵심 콘텐츠
[[menu.main]]
  identifier = "pillars"
  name = "영역별 가이드"
  url = "/pillars/"
  weight = 20

[[menu.main]]
  identifier = "solutions"
  name = "솔루션 리뷰"
  url = "/solutions/"
  weight = 30

[[menu.main]]
  identifier = "top"
  name = "Top 리스트"
  url = "/top/"
  weight = 40

# 3. 참고 자료 (Background)
[[menu.main]]
  identifier = "framework"
  name = "표준 요약"
  url = "/framework/"
  weight = 50

[[menu.main]]
  identifier = "korea"
  name = "한국 노트"
  url = "/korea/"
  weight = 60

# 4. 업데이트
[[menu.main]]
  identifier = "weekly"
  name = "월간 동향"
  url = "/weekly/"
  weight = 70

# 5. 사이트 정보
[[menu.main]]
  identifier = "evaluation"
  name = "평가 방법"
  url = "/evaluation/"
  weight = 80

[[menu.main]]
  identifier = "about"
  name = "소개"
  url = "/about/"
  weight = 90

[[menu.main]]
  identifier = "search"
  name = "검색"
  url = "/search/"
  weight = 100

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokai"
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

[taxonomies]
  category = "categories"
  tag = "tags"
  pillar = "pillars"
  series = "series"
