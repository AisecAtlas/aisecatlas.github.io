baseURL = "https://aisecatlas.github.io/"
languageCode = "ko-KR"
defaultContentLanguage = "ko"
title = "AISec Atlas"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = true
buildExpired = false

[pagination]
  pagerSize = 10

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "AISec Atlas"
  description = "AI 시대의 보안 아키텍처 지도. AI로 보안을 강화하는 일과 AI 자체를 지키는 일."
  keywords = ["AI Security", "LLM 보안", "Security Copilot", "Agentic SOC", "Zero Trust", "OWASP LLM Top 10", "Prompt Injection"]
  author = "AISec Atlas"
  defaultTheme = "dark"
  disableThemeToggle = true
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = false
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = false
  ShowToc = true
  TocOpen = false
  comments = false
  hideSummary = false

  mainSections = ["nonexistent"]

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

# IA 4분할 (운영자 지시 반영, 경로 유지·라벨/구조만 재정리)
# 1. 솔루션 카탈로그  2. AI 보안(독립)  3. 시나리오와 플레이북  4. 표준과 규제

[[menu.main]]
  identifier = "solutions"
  name = "솔루션 카탈로그"
  url = "/pillars/"
  weight = 10

[[menu.main]]
  identifier = "aisec"
  name = "AI 보안"
  url = "/ai/"
  weight = 20

[[menu.main]]
  identifier = "aisec-defend"
  name = "AI를 지키는 일"
  url = "/ai/defend-ai/"
  parent = "aisec"
  weight = 1

[[menu.main]]
  identifier = "aisec-augment"
  name = "AI로 보안 강화"
  url = "/ai/augment-security/"
  parent = "aisec"
  weight = 2

[[menu.main]]
  identifier = "scenarios"
  name = "시나리오와 플레이북"
  url = "/scenarios/"
  weight = 30

[[menu.main]]
  identifier = "scenarios-soar"
  name = "SOAR와 Hyperautomation"
  url = "/automation/soar-evolution/"
  parent = "scenarios"
  weight = 1

[[menu.main]]
  identifier = "scenarios-copilot"
  name = "Security Copilots"
  url = "/automation/security-copilots/"
  parent = "scenarios"
  weight = 2

[[menu.main]]
  identifier = "standards"
  name = "표준과 규제"
  url = "/framework/"
  weight = 40

[[menu.main]]
  identifier = "search"
  name = "검색"
  url = "/search/"
  weight = 50

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokai"
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"
