# AISec Atlas — 수집 소스 레지스트리
# aisec-collector 에이전트가 이 파일을 순회하며 수집한다.
#
# 필드:
#   id     : 고유 슬러그(ledger dedup·로그용)
#   axis   : augment(AI로 보안 강화) | defend(AI 자체 방어) | both
#   tier   : 1(1차출처·공식 발표·표준) | 2(분석·뉴스·블로그)
#   name   : 사람이 읽는 소스명
#   url    : 우선 확인할 URL(블로그/릴리스/리포)
#   query  : WebSearch 보조 질의(최신 항목 탐색용)
#   tags   : 분류 힌트(콘텐츠 매핑·POC후보 판단에 사용)
#   poc_candidate_hint: true 면 신제품/도구 발견 시 POC후보로 우선 태깅
#
# ※ 이 목록은 "사람(H5)이 최종 큐레이션"한다. 신뢰 가능한 1차출처를 우선 유지하고,
#   2차 자료만 근거인 소스는 주기적으로 점검·교체한다. 아래는 착수용 시드 목록(초안).

meta:
  curated_by: human
  last_reviewed: 2026-05-30
  collection_window_days: 8   # 직전 N일 내 게시물만 신규 후보로 고려(주1회 가정 + 여유)

sources:
  # ───────────────────────── augment : AI로 보안 강화 ─────────────────────────
  - id: ms-security-copilot
    axis: augment
    tier: 1
    name: Microsoft Security Copilot Blog
    url: https://techcommunity.microsoft.com/category/microsoft-security/blog/microsoft-security-blog
    query: "Microsoft Security Copilot agent SOC 2026"
    tags: [security-copilot, agentic-soc, soar]
    poc_candidate_hint: true

  - id: crowdstrike-charlotte
    axis: augment
    tier: 1
    name: CrowdStrike Charlotte AI / Blog
    url: https://www.crowdstrike.com/en-us/blog/
    query: "CrowdStrike Charlotte AI agentic detection triage"
    tags: [charlotte-ai, agentic-soc, threat-hunting]
    poc_candidate_hint: true

  - id: google-secops
    axis: augment
    tier: 1
    name: Google Cloud Security (SecOps / Gemini) Blog
    url: https://cloud.google.com/blog/products/identity-security
    query: "Google SecOps Gemini security agent SOAR 2026"
    tags: [google-secops, gemini, soar]
    poc_candidate_hint: true

  - id: agentic-soc-news
    axis: augment
    tier: 2
    name: Agentic SOC / AI SOC 시장 동향(검색)
    url: ""
    query: "agentic SOC AI alert triage autonomous SOC analyst 2026"
    tags: [agentic-soc, market-trend]
    poc_candidate_hint: false

  # ───────────────────────── defend : AI 자체 방어 ─────────────────────────
  - id: owasp-llm-top10
    axis: defend
    tier: 1
    name: OWASP Top 10 for LLM Applications
    url: https://genai.owasp.org/
    query: "OWASP LLM Top 10 2025 update Agentic"
    tags: [owasp, llm-top10, standard]
    poc_candidate_hint: false

  - id: owasp-agentic
    axis: defend
    tier: 1
    name: OWASP Agentic Security Initiative / Agentic Top 10
    url: https://genai.owasp.org/initiatives/
    query: "OWASP Agentic AI Top 10 threats security"
    tags: [owasp, agentic, standard]
    poc_candidate_hint: false

  - id: nist-ai-rmf
    axis: defend
    tier: 1
    name: NIST AI Risk Management Framework
    url: https://www.nist.gov/itl/ai-risk-management-framework
    query: "NIST AI RMF generative AI profile update"
    tags: [nist, ai-rmf, standard]
    poc_candidate_hint: false

  - id: cisa-ai
    axis: defend
    tier: 1
    name: CISA AI Security Guidance
    url: https://www.cisa.gov/ai
    query: "CISA AI security guidance secure by design 2026"
    tags: [cisa, guidance, standard]
    poc_candidate_hint: false

  - id: ai-spm-vendors
    axis: defend
    tier: 2
    name: AI-SPM / LLM 방화벽 벤더 동향(검색)
    url: ""
    query: "AI-SPM AI security posture management prompt injection firewall vendor 2026"
    tags: [ai-spm, llm-firewall, prompt-injection]
    poc_candidate_hint: true

  - id: arxiv-llm-sec
    axis: defend
    tier: 1
    name: arXiv cs.CR — LLM/Agent 보안 신규 논문
    url: https://arxiv.org/list/cs.CR/recent
    query: "arxiv prompt injection indirect agent jailbreak defense 2026"
    tags: [research, prompt-injection, jailbreak]
    poc_candidate_hint: false
